name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Extract wallpaper info
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')

          # Create comment body
          COMMENT_BODY="每日壁纸推荐"
          COMMENT_BODY="$COMMENT_BODY\n\n"
          COMMENT_BODY="$COMMENT_BODY桌面壁纸"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY标题: $DESKTOP_TITLE"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY链接: $DESKTOP_URL"
          COMMENT_BODY="$COMMENT_BODY\n\n"
          COMMENT_BODY="$COMMENT_BODY移动壁纸"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY标题: $MOBILE_TITLE"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY链接: $MOBILE_URL"
          COMMENT_BODY="$COMMENT_BODY\n\n"
          COMMENT_BODY="$COMMENT_BODY头像壁纸"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY标题: $AVATAR_TITLE"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODY链接: $AVATAR_URL"
          COMMENT_BODY="$COMMENT_BODY\n\n"
          COMMENT_BODY="$COMMENT_BODY自动同步自 wallpaper-daily"
          COMMENT_BODY="$COMMENT_BODY\n"
          COMMENT_BODY="$COMMENT_BODYAuto generated by 小溪"

          # Print body for debugging
          echo "Comment body:"
          echo "$COMMENT_BODY"

          # Create GraphQL payload
          PAYLOAD=$(jq -n --arg body "$COMMENT_BODY" '{
            "query": "mutation AddDiscussionComment($body: String!) { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: $body }) { comment { id } } }",
            "variables": {"body": $body}
          }')

          # Print payload for debugging
          echo "Payload:"
          echo "$PAYLOAD"

          # Post comment
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
