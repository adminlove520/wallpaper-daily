name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test basic comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Testing basic comment..."
          
          # Create a simple test comment
          TEST_COMMENT="测试评论\n\n这是一个测试评论\n包含多行内容\n\n测试成功！"
          
          echo "Test comment: $TEST_COMMENT"
          
          # Create payload with hardcoded comment
          PAYLOAD='{"query":"mutation{addDiscussionComment(input:{discussionId:\"D_kwDORQmU5s4Ak6V-\",body:\"测试评论\\n\\n这是一个测试评论\\n包含多行内容\\n\\n测试成功！\"}){comment{id}}}"}'
          
          echo "Payload: $PAYLOAD"
          
          # Post test comment
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          
          echo "Test comment posted!"
