name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Debug: print data
          echo "Data received: $DATA"
          
          # Extract wallpaper info using jq with error handling
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')

          # Debug: print extracted data
          echo "Desktop: $DESKTOP_TITLE, $DESKTOP_URL"
          echo "Mobile: $MOBILE_TITLE, $MOBILE_URL"
          echo "Avatar: $AVATAR_TITLE, $AVATAR_URL"

          # Create comment body using a here-doc
          BODY=$(cat << 'EOF'
## 🎨 每日壁纸推荐

### 🖥️ 桌面壁纸
**标题:** DESKTOP_TITLE
**链接:** DESKTOP_URL
<img alt="桌面壁纸" src="DESKTOP_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

### 📱 移动壁纸
**标题:** MOBILE_TITLE
**链接:** MOBILE_URL
<img alt="移动壁纸" src="MOBILE_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

### 🤖 头像壁纸
**标题:** AVATAR_TITLE
**链接:** AVATAR_URL
<img alt="头像壁纸" src="AVATAR_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

---

*自动同步自 [wallpaper-daily](https://github.com/adminlove520/wallpaper-daily)* 🌟
Auto generated by [小溪](https://adminlove520.github.io/xiaoxi-blog/)
EOF
)

          # Replace placeholders
          BODY=$(echo "$BODY" | sed "s/DESKTOP_TITLE/$DESKTOP_TITLE/g")
          BODY=$(echo "$BODY" | sed "s/DESKTOP_URL/$DESKTOP_URL/g")
          BODY=$(echo "$BODY" | sed "s/MOBILE_TITLE/$MOBILE_TITLE/g")
          BODY=$(echo "$BODY" | sed "s/MOBILE_URL/$MOBILE_URL/g")
          BODY=$(echo "$BODY" | sed "s/AVATAR_TITLE/$AVATAR_TITLE/g")
          BODY=$(echo "$BODY" | sed "s/AVATAR_URL/$AVATAR_URL/g")

          # Debug: print body
          echo "Body length: ${#BODY}"
          echo "Full body: $BODY"

          # Create GraphQL payload using jq
          PAYLOAD=$(jq -n --arg body "$BODY" '{
            "query": "mutation AddDiscussionComment($body: String!) { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: $body }) { comment { id } } }",
            "variables": {"body": $body}
          }')

          # Debug: print payload
          echo "Payload: $PAYLOAD"

          # Post comment using direct GraphQL API call
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
