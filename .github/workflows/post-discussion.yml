name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Extract wallpaper info using jq with error handling
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')

          # Create comment body
          BODY="## 🎨 每日壁纸推荐\n\n"
          BODY="$BODY### 🖥️ 桌面壁纸\n"
          BODY="$BODY**标题:** $DESKTOP_TITLE\n"
          BODY="$BODY**链接:** $DESKTOP_URL\n"
          BODY="$BODY<img alt=\"桌面壁纸\" src=\"$DESKTOP_URL\" style=\"max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;\" />\n\n"
          BODY="$BODY### 📱 移动壁纸\n"
          BODY="$BODY**标题:** $MOBILE_TITLE\n"
          BODY="$BODY**链接:** $MOBILE_URL\n"
          BODY="$BODY<img alt=\"移动壁纸\" src=\"$MOBILE_URL\" style=\"max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;\" />\n\n"
          BODY="$BODY### 🤖 头像壁纸\n"
          BODY="$BODY**标题:** $AVATAR_TITLE\n"
          BODY="$BODY**链接:** $AVATAR_URL\n"
          BODY="$BODY<img alt=\"头像壁纸\" src=\"$AVATAR_URL\" style=\"max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;\" />\n\n"
          BODY="$BODY---\n\n"
          BODY="$BODY*自动同步自 [wallpaper-daily](https://github.com/adminlove520/wallpaper-daily)* 🌟\n"
          BODY="$BODYAuto generated by [小溪](https://adminlove520.github.io/xiaoxi-blog/)"

          # Debug: print body length
          echo "Body length: ${#BODY}"
          echo "First 100 chars: ${BODY:0:100}..."

          # Create GraphQL payload using jq
          PAYLOAD=$(jq -n --arg body "$BODY" '{"query": "mutation AddDiscussionComment($body: String!) { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: $body }) { comment { id } } }", "variables": {"body": $body}}')

          # Debug: print payload status
          echo "Payload created successfully"

          # Post comment using direct GraphQL API call
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
