name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          echo "Step 1: Getting wallpaper data..."
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          echo "Data received: $DATA"
          
          # Extract wallpaper info
          echo "Step 2: Extracting wallpaper info..."
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')
          
          echo "Desktop: $DESKTOP_TITLE, $DESKTOP_URL"
          echo "Mobile: $MOBILE_TITLE, $MOBILE_URL"
          echo "Avatar: $AVATAR_TITLE, $AVATAR_URL"

          # Create comment body using simple format
          echo "Step 3: Creating comment body..."
          COMMENT="每日壁纸推荐\n\n"
          COMMENT="$COMMENT桌面壁纸\n"
          COMMENT="$COMMENT标题: $DESKTOP_TITLE\n"
          COMMENT="$COMMENT链接: $DESKTOP_URL\n\n"
          COMMENT="$COMMENT移动壁纸\n"
          COMMENT="$COMMENT标题: $MOBILE_TITLE\n"
          COMMENT="$COMMENT链接: $MOBILE_URL\n\n"
          COMMENT="$COMMENT头像壁纸\n"
          COMMENT="$COMMENT标题: $AVATAR_TITLE\n"
          COMMENT="$COMMENT链接: $AVATAR_URL\n\n"
          COMMENT="$COMMENT自动同步自 wallpaper-daily\n"
          COMMENT="$COMMENTAuto generated by 小溪"

          echo "Comment length: ${#COMMENT}"
          echo "Comment content:"
          echo "$COMMENT"

          # Create simple GraphQL payload
          echo "Step 4: Creating GraphQL payload..."
          PAYLOAD='{"query":"mutation{addDiscussionComment(input:{discussionId:\"D_kwDORQmU5s4Ak6V-\",body:\"PLACEHOLDER\"}){comment{id}}}"}'
          
          # Replace placeholder with comment content
          ESCAPED_COMMENT=$(echo "$COMMENT" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\n/\\n/g')
          PAYLOAD=$(echo "$PAYLOAD" | sed "s/PLACEHOLDER/$ESCAPED_COMMENT/g")
          
          echo "Payload created, length: ${#PAYLOAD}"
          echo "First 500 chars: ${PAYLOAD:0:500}..."

          # Post comment
          echo "Step 5: Posting comment..."
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
