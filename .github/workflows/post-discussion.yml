name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Extract wallpaper info using jq
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url')

          # Create comment body
          BODY='## 🎨 每日壁纸推荐

            ### 🖥️ 桌面壁纸
            **标题:** $DESKTOP_TITLE
            **链接:** $DESKTOP_URL
            <img alt="桌面壁纸" src="$DESKTOP_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

            ### 📱 移动壁纸
            **标题:** $MOBILE_TITLE
            **链接:** $MOBILE_URL
            <img alt="移动壁纸" src="$MOBILE_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

            ### 🤖 头像壁纸
            **标题:** $AVATAR_TITLE
            **链接:** $AVATAR_URL
            <img alt="头像壁纸" src="$AVATAR_URL" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;" />

            ---

            *自动同步自 [wallpaper-daily](https://github.com/adminlove520/wallpaper-daily)* 🌟
            Auto generated by [小溪](https://adminlove520.github.io/xiaoxi-blog/)'

          # Escape BODY for JSON
          ESCAPED_BODY=$(echo "$BODY" | jq -Rsa .)

          # Post comment using direct GraphQL API call
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: '"$ESCAPED_BODY"' }) { comment { id } } }"}'

          echo "Comment posted successfully!"

