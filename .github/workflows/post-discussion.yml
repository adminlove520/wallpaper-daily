name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 << 'PYEOF'
import os
import requests
import json

# Get wallpaper data
print("Step 1: Getting wallpaper data...")
response = requests.get("https://wallpaper-daily-iota.vercel.app/api/latest")
response.raise_for_status()
data = response.json()
print(f"Data received: {data}")

# Extract wallpaper info
desktop_title = data.get('categories', {}).get('desktop', {}).get('title', '未获取到')
desktop_url = data.get('categories', {}).get('desktop', {}).get('url', '未获取到')
mobile_title = data.get('categories', {}).get('mobile', {}).get('title', '未获取到')
mobile_url = data.get('categories', {}).get('mobile', {}).get('url', '未获取到')
avatar_title = data.get('categories', {}).get('avatar', {}).get('title', '未获取到')
avatar_url = data.get('categories', {}).get('avatar', {}).get('url', '未获取到')

print(f"Desktop: {desktop_title}, {desktop_url}")
print(f"Mobile: {mobile_title}, {mobile_url}")
print(f"Avatar: {avatar_title}, {avatar_url}")

# Create comment body
print("Step 2: Creating comment body...")
body = f"""每日壁纸推荐

桌面壁纸
标题: {desktop_title}
链接: {desktop_url}

移动壁纸
标题: {mobile_title}
链接: {mobile_url}

头像壁纸
标题: {avatar_title}
链接: {avatar_url}

自动同步自 wallpaper-daily
Auto generated by 小溪"""

print(f"Comment length: {len(body)}")
print(f"Comment content:\n{body}")

# GitHub GraphQL API setup
print("Step 3: Setting up GitHub API...")
token = os.environ.get('GH_PAT')
if not token:
    print("Error: GH_PAT environment variable not set")
    exit(1)

headers = {
    "Authorization": f"Bearer {token}",
    "Content-Type": "application/json"
}

# Create GraphQL payload
print("Step 4: Creating GraphQL payload...")
query = '''
mutation AddDiscussionComment($body: String!) {
  addDiscussionComment(input: { discussionId: "D_kwDORQmU5s4Ak6V-", body: $body }) {
    comment {
      id
    }
  }
}
'''

payload = {
    "query": query,
    "variables": {
        "body": body
    }
}

# Post comment
print("Step 5: Posting comment...")
response = requests.post(
    "https://api.github.com/graphql",
    headers=headers,
    json=payload
)

print(f"Response status: {response.status_code}")
print(f"Response content: {response.text}")

if response.status_code == 200:
    print("Comment posted successfully!")
else:
    print("Failed to post comment")
    exit(1)
PYEOF
