name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url')

          BODY="## 🎨 每日壁纸推荐"
          BODY="$BODY\n\n### 🖥️ 桌面壁纸"
          BODY="$BODY\n**标题:** $DESKTOP_TITLE"
          BODY="$BODY\n**链接:** $DESKTOP_URL"
          BODY="$BODY\n<img alt='桌面壁纸' src='$DESKTOP_URL' style='max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;' />"
          BODY="$BODY\n\n### 📱 移动壁纸"
          BODY="$BODY\n**标题:** $MOBILE_TITLE"
          BODY="$BODY\n**链接:** $MOBILE_URL"
          BODY="$BODY\n<img alt='移动壁纸' src='$MOBILE_URL' style='max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;' />"
          BODY="$BODY\n\n### 🤖 头像壁纸"
          BODY="$BODY\n**标题:** $AVATAR_TITLE"
          BODY="$BODY\n**链接:** $AVATAR_URL"
          BODY="$BODY\n<img alt='头像壁纸' src='$AVATAR_URL' style='max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px;' />"
          BODY="$BODY\n\n---"
          BODY="$BODY\n\n*自动同步自 [wallpaper-daily](https://github.com/adminlove520/wallpaper-daily)* 🌟"
          BODY="$BODY\nAuto generated by [小溪](https://adminlove520.github.io/xiaoxi-blog/)"

          PAYLOAD=$(jq -n --arg body "$BODY" '{"query": "mutation { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: $body }) { comment { id } } }"}')

          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
