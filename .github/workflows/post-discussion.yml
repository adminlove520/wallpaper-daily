name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Extract wallpaper info
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')

          # Create comment body with proper escaping
          COMMENT_BODY="每日壁纸推荐\\n\\n"
          COMMENT_BODY+="桌面壁纸\\n"
          COMMENT_BODY+="标题: $DESKTOP_TITLE\\n"
          COMMENT_BODY+="链接: $DESKTOP_URL\\n"
          COMMENT_BODY+="![桌面壁纸]($DESKTOP_URL)\\n\\n"
          COMMENT_BODY+="移动壁纸\\n"
          COMMENT_BODY+="标题: $MOBILE_TITLE\\n"
          COMMENT_BODY+="链接: $MOBILE_URL\\n"
          COMMENT_BODY+="![移动壁纸]($MOBILE_URL)\\n\\n"
          COMMENT_BODY+="头像壁纸\\n"
          COMMENT_BODY+="标题: $AVATAR_TITLE\\n"
          COMMENT_BODY+="链接: $AVATAR_URL\\n"
          COMMENT_BODY+="![头像壁纸]($AVATAR_URL)\\n\\n"
          COMMENT_BODY+="自动同步自 wallpaper-daily\\n"
          COMMENT_BODY+="Auto generated by 小溪"

          # Print body for debugging
          echo "Comment body:"
          echo "$COMMENT_BODY"

          # Create GraphQL payload (single line format as recommended in the issue)
          PAYLOAD='{"query":"mutation{addDiscussionComment(input:{discussionId:\"D_kwDORQmU5s4Ak6V-\",body:\"'"$COMMENT_BODY"'\"}){comment{id}}}"}'

          # Print payload for debugging
          echo "Payload:"
          echo "$PAYLOAD"

          # Post comment using the exact format from the issue
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
