name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get wallpaper data and post comment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get wallpaper data
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          # Extract wallpaper info
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // "未获取到"')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // "未获取到"')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // "未获取到"')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // "未获取到"')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // "未获取到"')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // "未获取到"')

          # Create comment body
          BODY="每日壁纸推荐\n\n"
          BODY="$BODY桌面壁纸\n"
          BODY="$BODY标题: $DESKTOP_TITLE\n"
          BODY="$BODY链接: $DESKTOP_URL\n"
          BODY="$BODY![桌面壁纸]($DESKTOP_URL)\n\n"
          BODY="$BODY移动壁纸\n"
          BODY="$BODY标题: $MOBILE_TITLE\n"
          BODY="$BODY链接: $MOBILE_URL\n"
          BODY="$BODY![移动壁纸]($MOBILE_URL)\n\n"
          BODY="$BODY头像壁纸\n"
          BODY="$BODY标题: $AVATAR_TITLE\n"
          BODY="$BODY链接: $AVATAR_URL\n"
          BODY="$BODY![头像壁纸]($AVATAR_URL)\n\n"
          BODY="$BODY自动同步自 wallpaper-daily\n"
          BODY="$BODYAuto generated by 小溪"

          # Create payload
          PAYLOAD=$(jq -n --arg body "$BODY" '{"query": "mutation { addDiscussionComment(input: { discussionId: \"D_kwDORQmU5s4Ak6V-\", body: \"'"$BODY"'\" }) { comment { id } } }"}')

          # Post comment
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Comment posted successfully!"
