name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 获取壁纸并发送评论
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 获取数据
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url')

          # 用 Python 生成合法的 JSON
          python3 << 'PYEOF'
import json
import os

body = """## 每日壁纸推荐

Desktop: """ + os.environ['DESKTOP_TITLE'] + """
""" + os.environ['DESKTOP_URL'] + """

Mobile: """ + os.environ['MOBILE_TITLE'] + """
""" + os.environ['MOBILE_URL'] + """

Avatar: """ + os.environ['AVATAR_TITLE'] + """
""" + os.environ['AVATAR_URL'] + """

自动同步自 nuanXinProPic"""

body_json = json.dumps(body)
query = 'mutation { addDiscussionComment(input: { discussionId: "D_kwDORQmU5s4Ak6V-", body: ' + body_json + ' }) { comment { id } } }'
payload = json.dumps({"query": query})
print(payload)
PYEOF

          > payload.json

          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d @payload.json
