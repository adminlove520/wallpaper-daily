name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 获取壁纸并发送评论
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 获取数据
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          
          DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title')
          DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url')
          MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title')
          MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url')
          AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title')
          AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url')

          # 构建 body，用 jq -Rs 转义
          BODY=$(cat << 'ENDMARKER'
## 📅 每日壁纸推荐
### 🖥️ Desktop
DESKTOP_TITLE_PLACEHOLDER
DESKTOP_URL_PLACEHOLDER

### 📱 Mobile
MOBILE_TITLE_PLACEHOLDER
MOBILE_URL_PLACEHOLDER

### 🧑‍🎤 Avatar
AVATAR_TITLE_PLACEHOLDER
AVATAR_URL_PLACEHOLDER

---
*自动同步自 [nuanXinProPic](https://github.com/IT-NuanxinPro/nuanXinProPic)*
ENDMARKER
          | sed "s/DESKTOP_TITLE_PLACEHOLDER/**$DESKTOP_TITLE**/g" \
          | sed "s|DESKTOP_URL_PLACEHOLDER|![Desktop]($DESKTOP_URL)|g" \
          | sed "s/MOBILE_TITLE_PLACEHOLDER/**$MOBILE_TITLE**/g" \
          | sed "s|MOBILE_URL_PLACEHOLDER|![Mobile]($MOBILE_URL)|g" \
          | sed "s/AVATAR_TITLE_PLACEHOLDER/**$AVATAR_TITLE**/g" \
          | sed "s|AVATAR_URL_PLACEHOLDER|![Avatar]($AVATAR_URL)|g" \
          | jq -Rs .)

          # 发送到 GraphQL
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { addDiscussionComment(input: { discussionId: \\\"D_kwDORQmU5s4Ak6V-\\\", body: $BODY }) { comment { id } } }\"}"
