name: Post to Discussion

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 获取最新壁纸数据
        run: |
          DATA=$(curl -s "https://wallpaper-daily-iota.vercel.app/api/latest")
          echo "DESKTOP_TITLE=$(echo "$DATA" | jq -r '.categories.desktop.title // empty')" >> $GITHUB_ENV
          echo "DESKTOP_URL=$(echo "$DATA" | jq -r '.categories.desktop.url // empty')" >> $GITHUB_ENV
          echo "MOBILE_TITLE=$(echo "$DATA" | jq -r '.categories.mobile.title // empty')" >> $GITHUB_ENV
          echo "MOBILE_URL=$(echo "$DATA" | jq -r '.categories.mobile.url // empty')" >> $GITHUB_ENV
          echo "AVATAR_TITLE=$(echo "$DATA" | jq -r '.categories.avatar.title // empty')" >> $GITHUB_ENV
          echo "AVATAR_URL=$(echo "$DATA" | jq -r '.categories.avatar.url // empty')" >> $GITHUB_ENV
          echo "DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 发评论到 Discussion
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 构建 body，用 \\n 换行
          BODY="## 📅 每日壁纸推荐 ${{ env.DATE }}\n\n### 🖥️ Desktop\n**${{ env.DESKTOP_TITLE }}**\n![Desktop](${{ env.DESKTOP_URL }})\n\n### 📱 Mobile\n**${{ env.MOBILE_TITLE }}**\n![Mobile](${{ env.MOBILE_URL }})\n\n### 🧑‍🎤 Avatar\n**${{ env.AVATAR_TITLE }}**\n![Avatar](${{ env.AVATAR_URL }})\n\n---\n*自动同步自 [nuanXinProPic](https://github.com/IT-NuanxinPro/nuanXinProPic)*"

          # 发 GraphQL mutation
          curl -X POST https://api.github.com/graphql \
            -H "Authorization: bearer ${{ env.GH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { addDiscussionComment(input: { discussionId: \\\"D_kwDORQmU5s4Ak6V-\\\", body: \\\"$BODY\\\" }) { comment { id } } }\"}"
